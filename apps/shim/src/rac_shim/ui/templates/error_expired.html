<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Link Expired — $institution_name</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 4em auto; padding: 0 1em; color: #1a1a1a; }
    .brand { display: flex; align-items: center; gap: 1em; margin-bottom: 2em; }
    .brand img { height: 48px; }
    .error { background: #f8f8f8; border-left: 4px solid #b00020; padding: 1em 1.5em; border-radius: 4px; }
    .error h1 { color: #b00020; }
    .corr { font-family: monospace; font-size: 0.85em; color: #666; margin-top: 2em; }
  </style>
</head>
<body>
  <div class="brand">
    ${brand_logo_html}
    <span>$institution_name</span>
  </div>
  <div class="error">
    <h1>This reviewer link has expired</h1>
    <p>Your access link is no longer valid. Please contact the researcher who shared this link to request a new one.</p>
    <p>Researcher: <strong>$pi_name</strong><br>
    Contact: <a href="mailto:$researcher_contact_email">$researcher_contact_email</a></p>
  </div>
  <div class="corr">Reference ID: $correlation_id</div>
</body>
</html>
