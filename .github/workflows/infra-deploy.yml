# Infrastructure Deployment Workflow
#
# This workflow deploys RAC infrastructure across dev, staging, and prod environments.
# It enforces human-gated promotion via GitHub Environments (staging and prod require approval).
#
# ## GitHub Environment Setup Required
#
# Before running this workflow, configure three GitHub Environments in repo Settings:
#
# ### Environment: dev
# - Secrets:
#   - AZURE_CLIENT_ID: App registration client ID for GHA Infra Deploy
#   - AZURE_TENANT_ID: Entra tenant ID (same across all environments)
#   - AZURE_SUBSCRIPTION_ID_DEV: Azure subscription ID for dev
# - Variables:
#   - AZURE_LOCATION: Azure region (e.g., eastus)
# - Deployment branches: none (allow all)
# - Required reviewers: none (dev is auto-deployed)
#
# ### Environment: staging
# - Secrets:
#   - AZURE_CLIENT_ID: (same as dev)
#   - AZURE_TENANT_ID: (same as dev)
#   - AZURE_SUBSCRIPTION_ID_STAGING: Azure subscription ID for staging
# - Variables:
#   - AZURE_LOCATION: Azure region
# - Deployment branches: main only
# - Required reviewers: enabled (1-2 team members with deploy authority)
#
# ### Environment: prod
# - Secrets:
#   - AZURE_CLIENT_ID: (same as dev)
#   - AZURE_TENANT_ID: (same as dev)
#   - AZURE_SUBSCRIPTION_ID_PROD: Azure subscription ID for prod
# - Variables:
#   - AZURE_LOCATION: Azure region
# - Deployment branches: main only
# - Required reviewers: enabled (2+ team members with deploy authority)
#
# ## Federated Identity Setup
#
# The GHA Infra Deploy app registration must have federated credentials:
# - repo:<org>/rac:environment:dev
# - repo:<org>/rac:environment:staging
# - repo:<org>/rac:environment:prod
#
# See docs/runbooks/bootstrap.md for complete setup instructions.

name: infra-deploy

on:
  push:
    branches: [main]
    paths: ['infra/**']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        type: choice
        options: [dev, staging, prod]
        default: dev

permissions:
  id-token: write
  contents: read

jobs:
  whatif-dev:
    name: What-if (dev)
    if: github.event_name == 'push' || github.event.inputs.environment == 'dev'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}

      - name: What-if
        run: |
          az deployment sub what-if \
            --location ${{ vars.AZURE_LOCATION }} \
            --template-file infra/main.bicep \
            --parameters infra/environments/dev.bicepparam \
            --parameters pgAdminPassword=$RAC_PG_ADMIN_PASSWORD appGwTlsCertKvSecretId=$RAC_APPGW_TLS_CERT_KV_SECRET_ID
        env:
          RAC_PG_ADMIN_PASSWORD: ${{ secrets.RAC_PG_ADMIN_PASSWORD }}
          RAC_APPGW_TLS_CERT_KV_SECRET_ID: ${{ secrets.RAC_APPGW_TLS_CERT_KV_SECRET_ID }}

  deploy-dev:
    name: Deploy (dev)
    if: github.event_name == 'push' || github.event.inputs.environment == 'dev'
    needs: whatif-dev
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}

      # Submit the deployment asynchronously. A synchronous `az deployment sub
      # create` would block the step for the full deploy duration; GitHub's
      # federated OIDC assertions expire after 5 min, so any long deploy
      # eventually fails with AADSTS700024 when az CLI tries to refresh.
      - name: Submit deployment (async)
        run: |
          az deployment sub create \
            --name rac-dev-${{ github.run_id }} \
            --location ${{ vars.AZURE_LOCATION }} \
            --template-file infra/main.bicep \
            --parameters infra/environments/dev.bicepparam \
            --parameters pgAdminPassword=$RAC_PG_ADMIN_PASSWORD appGwTlsCertKvSecretId=$RAC_APPGW_TLS_CERT_KV_SECRET_ID \
            --no-wait
        env:
          RAC_PG_ADMIN_PASSWORD: ${{ secrets.RAC_PG_ADMIN_PASSWORD }}
          RAC_APPGW_TLS_CERT_KV_SECRET_ID: ${{ secrets.RAC_APPGW_TLS_CERT_KV_SECRET_ID }}

      # Poll deployment state. Each `az` call is short (< 5s) so it completes
      # before the current AAD access token's ~1hr lifetime needs refreshing.
      # If a call fails with an auth error, exit with code 2 so the operator
      # can re-run the job — the new run gets a fresh OIDC exchange and picks
      # up polling of the same deployment name.
      - name: Wait for deployment
        timeout-minutes: 90
        run: |
          DEP_NAME="rac-dev-${{ github.run_id }}"
          echo "Polling deployment $DEP_NAME every 60s..."
          while true; do
            if ! STATE=$(az deployment sub show --name "$DEP_NAME" --query properties.provisioningState -o tsv 2>/tmp/az-err); then
              echo "::warning::Poll failed:"
              cat /tmp/az-err
              if grep -q -E "AADSTS|expired|Authentication" /tmp/az-err 2>/dev/null; then
                echo "::error::Auth expired during long-running deploy. Re-run the workflow to resume polling."
                exit 2
              fi
              exit 1
            fi
            echo "[$(date -u +%H:%M:%SZ)] state=$STATE"
            case "$STATE" in
              Succeeded) echo "Deployment succeeded."; exit 0 ;;
              Failed|Canceled)
                echo "::error::Deployment terminated with state=$STATE"
                az deployment sub show --name "$DEP_NAME" --query properties.error -o json
                exit 1
                ;;
            esac
            sleep 60
          done

  deploy-staging:
    name: Deploy (staging)
    # Staging only deploys on explicit workflow_dispatch with environment=staging.
    # Push-to-main deploys dev only; promotion to staging is a human action so
    # observability tooling doesn't get spurious red runs when a staging Azure
    # subscription / federated credential isn't configured for this fork.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_STAGING }}

      - name: Deploy
        run: |
          az deployment sub create \
            --name rac-staging-${{ github.run_id }} \
            --location ${{ vars.AZURE_LOCATION }} \
            --template-file infra/main.bicep \
            --parameters infra/environments/staging.bicepparam \
            --parameters pgAdminPassword=$RAC_PG_ADMIN_PASSWORD appGwTlsCertKvSecretId=$RAC_APPGW_TLS_CERT_KV_SECRET_ID
        env:
          RAC_PG_ADMIN_PASSWORD: ${{ secrets.RAC_PG_ADMIN_PASSWORD }}
          RAC_APPGW_TLS_CERT_KV_SECRET_ID: ${{ secrets.RAC_APPGW_TLS_CERT_KV_SECRET_ID }}

  deploy-prod:
    name: Deploy (prod)
    # Prod only deploys on explicit workflow_dispatch with environment=prod.
    # No automatic staging->prod chain; each promotion is a human action via
    # the workflow_dispatch UI (which also enforces the GitHub Environment's
    # required-reviewers gate).
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    needs: []
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Deploy
        run: |
          az deployment sub create \
            --name rac-prod-${{ github.run_id }} \
            --location ${{ vars.AZURE_LOCATION }} \
            --template-file infra/main.bicep \
            --parameters infra/environments/prod.bicepparam \
            --parameters pgAdminPassword=$RAC_PG_ADMIN_PASSWORD appGwTlsCertKvSecretId=$RAC_APPGW_TLS_CERT_KV_SECRET_ID
        env:
          RAC_PG_ADMIN_PASSWORD: ${{ secrets.RAC_PG_ADMIN_PASSWORD }}
          RAC_APPGW_TLS_CERT_KV_SECRET_ID: ${{ secrets.RAC_APPGW_TLS_CERT_KV_SECRET_ID }}
